<div class="staticInfoContainer" style="margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr; gap: 50px;">
    <span class="spanSeparation">
        <div class="cicle" style="border-radius: 100px; width: 50px; height: 50px; margin-bottom: 5px;"></div>
        <div class="line1">
            <h2 class="loading-text" style="font-size: 20px; padding: 5px; justify-content: center;">Cargando...</h2>
        </div>
        <h4 class="line2"></h4>
        <h5 class="line3"></h5>
    </span>
    <ng-container *ngFor="let i of [1, 2, 3, 4, 5, 6]">
        
        <span class="spanSeparation">
            <div class="cicle" style="border-radius: 100px; width: 50px; height: 50px; margin-bottom: 5px;"></div>
            <h3 class="line1"></h3>
            <h4 class="line2"></h4>
            <h5 class="line3"></h5>
        </span>

    </ng-container>
    
</div>
